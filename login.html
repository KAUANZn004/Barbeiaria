<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>BarberSaaS — Entrar</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Fonte Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <!-- CSS consolidado -->
  <link rel="stylesheet" href="assets/css/style.css" />
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style type="text/disabled">
    /* ── Tokens de design (dark/gold premium) ──────── */
    :root {
      --gold:        #d4af37;
      --gold-dark:   #b8962e;
      --gold-glow:   rgba(212,175,55,0.25);
      --bg:          #0a0a0a;
      --surface:     #111111;
      --border:      rgba(255,255,255,0.07);
      --glass-bg:    rgba(255,255,255,0.04);
      --glass-border:rgba(255,255,255,0.1);
      --text:        #ffffff;
      --muted:       #888888;
      --dim:         #444444;
      --radius-md:   12px;
      --radius-lg:   16px;
      --radius-xl:   20px;
      --radius-full: 9999px;
    }

    * { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Fundo decorativo com blur (sem imagem externa) */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      /* Gradiente radial dourado no canto superior — efeito "luz de estúdio" */
      background:
        radial-gradient(ellipse 60% 40% at 20% -10%, rgba(212,175,55,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 110%, rgba(212,175,55,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card principal glassmorphism ──────────────── */
    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 36px 28px 32px;
      animation: card-in 0.45s cubic-bezier(0.34,1.4,0.64,1);
    }

    @keyframes card-in {
      from { opacity:0; transform: translateY(24px) scale(0.97); }
      to   { opacity:1; transform: translateY(0)    scale(1);    }
    }

    /* ── Logo / marca ──────────────────────────────── */
    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,175,55,0.1);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: var(--radius-full);
      padding: 6px 14px;
      margin-bottom: 22px;
    }

    .logo-badge span:first-child {
      font-size: 16px;
    }

    .logo-badge span:last-child {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--gold);
    }

    /* ── Títulos ───────────────────────────────────── */
    .card-title {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── Campos do formulário ──────────────────────── */
    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      background: #1c1c1c;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-md);
      padding: 13px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    .field input:focus {
      border-color: var(--gold);
      background: #202020;
      box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
    }

    .field input::placeholder { color: var(--dim); }

    /* ── Mensagem de erro inline ───────────────────── */
    #error-msg {
      display: none;
      font-size: 12px;
      font-weight: 600;
      color: #ef4444;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    #error-msg.visible { display: block; }

    /* ── Botão de submit (dourado) ─────────────────── */
    .btn-primary {
      width: 100%;
      padding: 15px 20px;
      background: var(--gold);
      color: #000;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 800;
      border: none;
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      -webkit-appearance: none;
      appearance: none;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--gold-dark);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--gold-glow);
    }

    .btn-primary:active:not(:disabled) { transform: translateY(0); }

    .btn-primary:disabled {
      background: #252525;
      color: var(--dim);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ── Separador ─────────────────────────────────── */
    .divider {
      position: relative;
      text-align: center;
      margin: 22px 0;
      color: var(--dim);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: calc(50% - 36px);
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    /* ── Link para agendamento do cliente ──────────── */
    .client-link {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .client-link a {
      color: var(--gold);
      font-weight: 600;
      text-decoration: none;
      transition: color 0.15s;
    }

    .client-link a:hover { color: var(--gold-dark); }

    /* ── Spinner dentro do botão ───────────────────── */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }

    .loading .spinner { display: block; }
    .loading #btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body class="page-login">

  <!-- ================================================
       CARD DE LOGIN (glassmorphism)
  ================================================ -->
  <div class="login-card" role="main">

    <!-- Marca -->
    <div class="logo-badge">
      <span>✂️</span>
      <span>BARBERSAAS</span>
    </div>

    <h1 class="card-title">Bem-vindo de volta</h1>
    <p class="card-subtitle">Acesse sua conta para gerenciar<br>seus agendamentos.</p>

    <!-- Mensagem de erro (visível via JS) -->
    <div id="error-msg" role="alert"></div>

    <!-- Formulário de login -->
    <form id="login-form" novalidate autocomplete="on">

      <div class="field">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="seuemail@exemplo.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <!-- Botão de entrar -->
      <button type="submit" id="submit-btn" class="btn-primary">
        <div class="spinner" aria-hidden="true"></div>
        <span id="btn-text">Entrar</span>
      </button>

    </form>

    <div class="divider">OU</div>

    <!-- Link para agendamento como cliente (sem login) -->
    <p class="client-link">
      Quer agendar? <a href="index.html">Acesse como cliente →</a>
    </p>

  </div>

  <!-- ================================================
       SCRIPTS
       1. config.js → supabaseClient
       2. auth.js   → AuthService
       3. script inline → lógica da página
  ================================================ -->
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>

  <script>
    'use strict';

    /* ──────────────────────────────────────────────────
       Se já tem sessão ativa, redireciona sem mostrar login
    ────────────────────────────────────────────────── */
    (async () => {
      const session = await AuthService.getSession();
      if (!session) return; // Sem sessão → mostra o form normalmente

      // Tem sessão → descobre o papel e redireciona
      const { isBarbeiro, barbearia } = await AuthService.checkRole(session.user.id);
      if (isBarbeiro) {
        window.location.replace('dashboard.html');
      } else {
        // Cliente logado → tenta ir para a barbearia vinculada ao e-mail (se houver)
        // ou para a página principal sem slug
        window.location.replace('index.html');
      }
    })();

    /* ──────────────────────────────────────────────────
       Utilitários de UI do formulário
    ────────────────────────────────────────────────── */
    const loginForm  = document.getElementById('login-form');
    const submitBtn  = document.getElementById('submit-btn');
    const errorMsg   = document.getElementById('error-msg');

    // Mapa de mensagens de erro do Supabase → mensagens em pt-BR
    const ERROR_MAP = {
      'Invalid login credentials':  'E-mail ou senha incorretos.',
      'Email not confirmed':        'Confirme seu e-mail antes de entrar.',
      'Too many requests':          'Muitas tentativas. Aguarde alguns minutos.',
    };

    function showError(msg) {
      // Procura por uma mensagem amigável ou usa a original
      const friendly = Object.entries(ERROR_MAP).find(([key]) => msg.includes(key));
      errorMsg.textContent = friendly ? friendly[1] : msg;
      errorMsg.classList.add('visible');
    }

    function hideError() {
      errorMsg.classList.remove('visible');
      errorMsg.textContent = '';
    }

    function setLoading(on) {
      submitBtn.disabled = on;
      submitBtn.classList.toggle('loading', on);
    }

    /* ──────────────────────────────────────────────────
       Submit do formulário de login
    ────────────────────────────────────────────────── */
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Validação básica no cliente
      if (!email || !password) {
        showError('Preencha e-mail e senha para continuar.');
        return;
      }

      if (!supabaseClient) {
        showError('Serviço indisponível. Verifique as credenciais do Supabase em config.js.');
        return;
      }

      setLoading(true);

      try {
        // 1. Tenta autenticar
        const result = await AuthService.signIn(email, password);

        if (result.error) {
          showError(result.error.message);
          setLoading(false);
          return;
        }

        // 2. Login OK → verifica se é barbeiro ou cliente
        const userId = result.user.id;
        const { isBarbeiro, barbearia } = await AuthService.checkRole(userId);

        if (isBarbeiro) {
          // ── Dono/barbeiro → Dashboard
          window.location.replace('dashboard.html');
        } else {
          // ── Cliente → Página de agendamento
          // Tenta buscar a barbearia pelo slug armazenado no metadado do usuário
          // Se não houver, cai para index.html sem parâmetro
          const slugParam = result.user.user_metadata?.barbearia_slug;
          const dest = slugParam ? `index.html?b=${encodeURIComponent(slugParam)}` : 'index.html';
          window.location.replace(dest);
        }

      } catch (err) {
        showError('Erro inesperado. Tente novamente.');
        console.error('[Login] Erro inesperado:', err);
        setLoading(false);
      }
    });

    // Limpa o erro ao digitar em qualquer campo
    document.getElementById('email').addEventListener('input', hideError);
    document.getElementById('password').addEventListener('input', hideError);
  </script>

</body>
</html>
